[commit-msg.commands]
commitlint = { run = "bun commitlint -x @commitlint/config-conventional --edit $1" }

[pre-commit.commands]
typecheck = { glob = "*.{ts,tsx}", run = "bun typecheck-staged {staged_files}" }
lint = { glob = "*.{ts,tsx,json,jsonc}", run = "bun lint-check {staged_files}" }
test = { glob = "*.{ts,tsx}", run = "bun test-staged {staged_files}" }

[pre-push.commands]
typecheck = { run = "bun typecheck" }
lint = { run = "bun lint-check" }
test = { run = "bun test-ci" }

[post-checkout.commands]
sync-mise = { run = "mise install" }
clean-mise = { run = "mise prune -y" }
sync-bun = { run = "bun install --frozen-lockfile" }

[post-merge.commands]
sync-mise = { run = "mise install" }
clean-mise = { run = "mise prune -y" }
sync-bun = { run = "bun install --frozen-lockfile" }
